[package]
name = "qubitcoin-crypto"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Cryptographic primitives for Qubitcoin: SHA256d, RIPEMD160, SipHash, secp256k1"

[features]
default = ["native"]
native = ["secp256k1/global-context", "secp256k1/rand-std"]
wasm = []

[dependencies]
secp256k1 = { workspace = true }
bitcoin_hashes = { workspace = true }
hex = { workspace = true }

[dev-dependencies]
criterion = { workspace = true }

[[bench]]
name = "crypto_bench"
harness = false
